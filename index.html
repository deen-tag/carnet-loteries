<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tiketo — Carnet des loteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Big+Shoulders+Stencil:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script defer src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.init({ appId: "ed8e48a0-0f7c-44fb-8630-0e0a84eb9545" });
      window.__oneSignalReady = OneSignal;
    } catch (e) {
      window.__oneSignalInitError = (e && e.message) ? e.message : String(e);
    }
  });
</script>
<style>
  :root{
    --paper:#EDE3C8;        /* kraft ticket stock */
    --paper-deep:#E1D3A9;   /* shadowed stub tone */
    --surface:#F7F1DF;      /* raised card surface */
    --ink:#20291F;          /* deep ink */
    --stamp:#A8341F;        /* postal-ink red — primary accent */
    --carbon:#2E4A63;       /* carbon-copy blue — secondary accent */
    --gold:#B98A1D;         /* foil gold — prize / winner */
    --stone:#857A63;        /* muted stone */
    --line: rgba(32,41,31,.16);
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  body{margin:0;font-family:'Fraunces',serif;background:
      radial-gradient(1200px 600px at 10% -10%, #F3E9CE 0%, transparent 60%),
      var(--paper-deep);
    color:var(--ink);min-height:100vh;}
  body, input, textarea, button{font-family:'Fraunces',serif;}
  .sans{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Fraunces',serif;font-optical-sizing:auto;}
  .stencil{font-family:'Big Shoulders Stencil',sans-serif;font-weight:800;letter-spacing:.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .stamp{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--stamp);color:var(--stamp);padding:3px 11px 3px 9px;border-radius:999px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;transform:rotate(-2deg);font-family:'IBM Plex Mono',monospace;font-weight:600;background:rgba(168,52,31,.06);}
  .stamp::before{content:"●";font-size:8px;}
  .stamp-blue{border-color:var(--carbon);color:var(--carbon);background:rgba(46,74,99,.06);}
  .stamp-gold{border-color:var(--gold);color:var(--gold);background:rgba(185,138,29,.08);}

  .card{background:var(--surface);border-radius:6px;padding:24px;box-shadow:0 1px 0 var(--line), 0 12px 24px -14px rgba(32,41,31,.35);position:relative;}

  /* ---- signature: die-cut perforation tear line (duplicate ticket-book motif) ---- */
  .perf{
    position:relative;height:20px;margin:20px -24px;
    background-image: radial-gradient(circle 6px, var(--paper-deep) 6px, transparent 6.3px);
    background-repeat:repeat-x; background-position:10px center; background-size:22px 20px;
  }
  .perf::before,.perf::after{content:"";position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--paper-deep);}
  .perf::before{left:-11px;} .perf::after{right:-11px;}
  .perf-label{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--surface);padding:0 10px;font-size:9px;letter-spacing:.14em;color:var(--stone);white-space:nowrap;}

  .btn{border:none;border-radius:3px;padding:13px 18px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.02em;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--stamp);color:#fff;box-shadow:0 2px 0 #7A2517;}
  .btn-primary:hover{box-shadow:0 3px 0 #7A2517;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.6;cursor:default;transform:none;box-shadow:0 2px 0 #7A2517;}
  .btn-secondary{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
  .btn-secondary:hover{background:var(--ink);color:var(--paper);}
  .btn-ghost{background:transparent;border:none;color:var(--carbon);text-decoration:underline;text-underline-offset:3px;padding:6px 4px;}

  input[type=text],input[type=email]{width:100%;padding:11px 12px;border-radius:3px;border:1.5px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:14px;background:#fff;color:var(--ink);transition:border-color .15s ease, box-shadow .15s ease;}
  input[type=text]:focus,input[type=email]:focus,textarea:focus{outline:none;border-color:var(--stamp);box-shadow:0 0 0 3px rgba(168,52,31,.12);}
  textarea{font-family:'IBM Plex Mono',monospace;}
  label.field{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);font-weight:600;margin-bottom:7px;font-family:'IBM Plex Mono',monospace;}
  .err{color:var(--stamp);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  a{color:var(--carbon);}

  .grid{display:flex;flex-direction:column;gap:16px;}
  .resto-card{cursor:pointer;text-align:left;border:none;overflow:hidden;transition:box-shadow .2s ease;}
  .resto-card:hover{box-shadow:0 1px 0 var(--line), 0 16px 30px -16px rgba(32,41,31,.45);}
  .modal-bg{position:fixed;inset:0;background:rgba(32,41,31,.6);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:10;animation:fadeIn .18s ease;}
  .hidden{display:none !important;}
  .participant-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 12px;background:#fff;border-radius:3px;border:1px solid var(--line);margin-bottom:6px;flex-wrap:wrap;gap:6px;font-family:'IBM Plex Mono',monospace;animation:rise .25s ease both;}
  .history-row{padding:12px 14px;background:#fff;border-radius:3px;border:1px solid var(--line);margin-bottom:8px;}

  .ticket-no{font-family:'Big Shoulders Stencil',sans-serif;font-weight:800;line-height:.85;color:var(--ink);}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes stampIn{0%{opacity:0;transform:scale(2.2) rotate(-8deg);}70%{opacity:1;}100%{opacity:1;transform:scale(1) rotate(-2deg);}}
  @keyframes confettiFall{to{transform:translateY(120px) rotate(var(--r));opacity:0;}}
  .anim-rise{animation:riseIn .5s cubic-bezier(.2,.8,.2,1) both;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="app" style="max-width:760px;margin:0 auto;padding:32px 20px 80px;"></div>
<div id="toast" class="toast mono"></div>

<script type="module">
/* ============================================================
   🔧 CONFIGURATION FIREBASE — remplace les valeurs ci-dessous
   par celles de TON projet Firebase (Console Firebase >
   Paramètres du projet > Tes applications > SDK config).
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD6VGuVkh0Xb23JQnRDjc2apRumJyPgxYI",
  authDomain: "carnet-loteries.firebaseapp.com",
  projectId: "carnet-loteries",
  storageBucket: "carnet-loteries.firebasestorage.app",
  messagingSenderId: "525322331265",
  appId: "1:525322331265:web:a5df784e1b0e079a62d980"
};
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, getDoc, query, where,
  serverTimestamp, deleteDoc, doc, setDoc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);
const restoId = params.get("resto");

function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function clientDocId(rid, email){ return `${rid}_${email.trim().toLowerCase()}`; }

function toast(msg, ms=2200){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), ms);
}

function confettiBurst(container){
  const colors = ["#A8341F","#2E4A63","#B98A1D","#20291F"];
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:absolute;inset:0;overflow:hidden;pointer-events:none;border-radius:6px;";
  for (let i=0;i<28;i++){
    const p = document.createElement("span");
    const x = Math.random()*100;
    const rot = (Math.random()*360)|0;
    const delay = Math.random()*150;
    const size = 5 + Math.random()*5;
    p.style.cssText = `position:absolute;left:${x}%;top:-10px;width:${size}px;height:${size*.5}px;background:${colors[i%colors.length]};opacity:.95;transform:rotate(${rot}deg);animation:confettiFall ${900+Math.random()*500}ms ease-in ${delay}ms forwards;--r:${rot+180}deg;`;
    wrap.appendChild(p);
  }
  container.style.position = "relative";
  container.appendChild(wrap);
  setTimeout(()=>wrap.remove(), 1700);
}

// ---------- CONFIG CHECK ----------
function configMissing(){
  return Object.values(firebaseConfig).some(v => String(v).includes("REMPLACE_MOI"));
}

if (configMissing()) {
  $app.innerHTML = `
    <div class="card anim-rise">
      <span class="stamp">Configuration requise</span>
      <h1 class="display" style="font-size:24px;margin:12px 0 8px;">Il manque ta configuration Firebase</h1>
      <p style="color:var(--stone);font-size:14px;">
        Ouvre <span class="mono">index.html</span>, trouve le bloc <span class="mono">firebaseConfig</span>
        tout en haut du script, et remplace les valeurs "REMPLACE_MOI" par celles de ton projet Firebase
        (Console Firebase → Paramètres du projet → Tes applications → SDK config). Voir le README.
      </p>
    </div>`;
} else if (params.get("about") === "1") {
  renderAbout();
} else if (restoId) {
  renderPublic(restoId);
} else {
  renderAdmin();
}

// ================= PAGE D'EXPLICATION ("C'est quoi Tiketo ?") =================
function renderAbout(){
  document.body.style.background = "var(--ink)";
  $app.style.display="flex"; $app.style.alignItems="center"; $app.style.justifyContent="center"; $app.style.minHeight="100vh";
  $app.innerHTML = `
    <div style="width:100%;max-width:420px;" class="anim-rise">
      <div class="card" style="border-radius:8px;">
        <img src="logo.png" alt="Tiketo" style="height:30px;margin-bottom:18px;">
        <h1 class="display" style="font-size:24px;margin:0 0 14px;">C'est quoi Tiketo ?</h1>
        <p style="font-size:14px;line-height:1.7;color:var(--ink);margin:0 0 12px;">
          Tiketo est un simple outil utilisé par des commerces locaux (restaurants, cafés, boutiques...)
          pour organiser des tirages au sort en salle, sans application à installer.
        </p>
        <p style="font-size:14px;line-height:1.7;color:var(--stone);margin:0 0 12px;font-family:'IBM Plex Mono',monospace;">
          Le principe : le commerce affiche un QR code, tu le scannes, tu laisses ton prénom et ton email
          pour participer au tirage — c'est tout. Aucune app, aucun compte à créer.
        </p>
        <p style="font-size:14px;line-height:1.7;color:var(--stone);margin:0 0 20px;font-family:'IBM Plex Mono',monospace;">
          Tes informations ne servent qu'à ce commerce précis, pour te contacter en cas de gain ou t'envoyer
          ses offres si tu l'as accepté. Rien n'est revendu ni partagé ailleurs.
        </p>
        <a href="javascript:history.back()" class="btn btn-secondary" style="display:block;text-align:center;text-decoration:none;">← Retour</a>
      </div>
    </div>`;
}

// ================= PUBLIC TICKET PAGE =================
async function renderPublic(id){
  document.body.style.background = "var(--ink)";
  $app.style.display="flex"; $app.style.alignItems="center"; $app.style.justifyContent="center"; $app.style.minHeight="100vh";
  $app.innerHTML = `<div class="mono" style="color:var(--paper);letter-spacing:.05em;">Chargement…</div>`;

  const rSnap = await getDoc(doc(db,"restaurants",id));
  if (!rSnap.exists()){
    $app.innerHTML = `<div class="card anim-rise" style="text-align:center;max-width:340px;">
      <span class="stamp" style="margin-bottom:10px;">Introuvable</span>
      <p class="display" style="margin:8px 0 0;">Ce commerçant n'existe pas (ou plus). Vérifie le QR code.</p>
    </div>`;
    return;
  }
  const data = rSnap.data();
  const ticketNo = String(id).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");

  const isPromoClick = params.get("promo") === "1";
  const resultKind = params.get("result"); // "win" | "lose" | null

  if (isPromoClick || resultKind) {
    let heading, sub;
    if (resultKind === "win") { heading = "🎉 Bravo !"; sub = `${data.name} va te contacter pour ton lot. Merci d'avoir participé !`; }
    else if (resultKind === "lose") { heading = data.name; sub = `Tu n'as pas gagné cette fois, mais ${data.name} t'invite à retenter ta chance dans son établissement.`; }
    else { heading = data.name; sub = "Merci d'être abonné(e) aux offres. À bientôt !"; }
    $app.innerHTML = `
      <div style="width:100%;max-width:400px;" class="anim-rise">
        <div class="card" style="border-radius:8px;padding:0;overflow:hidden;">
          <div style="padding:20px 24px 4px;display:flex;justify-content:space-between;align-items:flex-start;">
            <img src="logo.png" alt="Tiketo" style="height:26px;">
            <span class="ticket-no" style="font-size:22px;color:var(--stamp);">N° ${esc(ticketNo)}</span>
          </div>
          <div style="padding:8px 24px 28px;text-align:center;">
            <h1 class="display" style="font-size:26px;margin:20px 0 8px;">${esc(heading)}</h1>
            <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">${esc(sub)}</p>
          </div>
        </div>
      </div>`;
    return;
  }

  // trouve le tirage actif de ce commerçant (2 filtres d'égalité, pas besoin
  // d'index composite Firestore)
  const drawsSnap = await getDocs(query(collection(db,"draws"), where("restaurantId","==",id)));
  const openDraw = drawsSnap.docs.find(d => d.data().status === "open");

  if (!openDraw){
    $app.innerHTML = `
      <div style="width:100%;max-width:400px;" class="anim-rise">
        <div class="card" style="border-radius:8px;text-align:center;">
          <img src="logo.png" alt="Tiketo" style="height:26px;margin-bottom:14px;">
          <h1 class="display" style="font-size:24px;margin:6px 0 8px;">${esc(data.name)}</h1>
          <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">Aucun tirage en cours pour le moment. Reviens bientôt !</p>
        </div>
      </div>`;
    return;
  }
  const drawId = openDraw.id;
  const draw = openDraw.data();
  const ticketNo2 = String(drawId).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");

  $app.innerHTML = `
    <div style="width:100%;max-width:400px;" class="anim-rise">
      <div class="card" style="border-radius:8px;padding:0;overflow:hidden;">
        <div style="padding:20px 24px 4px;display:flex;justify-content:space-between;align-items:flex-start;">
          <img src="logo.png" alt="Tiketo" style="height:26px;">
          <span class="ticket-no" style="font-size:22px;color:var(--stamp);">N° ${esc(ticketNo2)}</span>
        </div>
        <div style="padding:8px 24px 0;">
          <h1 class="display" style="font-size:30px;margin:12px 0 4px;">${esc(data.name)}</h1>
          <p style="color:var(--stone);font-size:14px;margin:0 0 4px;font-family:'IBM Plex Mono',monospace;">
            À gagner : <strong style="color:var(--stamp);">${esc(draw.prize)}</strong>
            ${draw.date ? ` · Tirage le ${esc(draw.date)}` : ""}
          </p>
        </div>

        <div class="perf"><span class="perf-label mono">DÉTACHER ICI</span></div>

        <div style="padding:4px 24px 24px;">
          <div id="ticket-form">
            <label class="field">PRÉNOM</label>
            <input type="text" id="f-prenom" placeholder="Ton prénom" style="margin-bottom:16px;">
            <label class="field">EMAIL</label>
            <input type="email" id="f-email" placeholder="ton@email.com" style="margin-bottom:16px;">
            <label style="display:flex;gap:10px;font-size:13px;color:var(--stone);margin-bottom:18px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">
              <input type="checkbox" id="f-promo"> J'accepte de recevoir des offres de ${esc(data.name)} (facultatif)
            </label>
            <p id="f-err" class="err"></p>
            <button class="btn btn-primary" style="width:100%;" id="f-submit">Valider mon ticket</button>
          </div>
        </div>
        <div style="text-align:center;padding:0 24px 18px;">
          <a href="?about=1" style="font-size:11px;color:var(--stone);font-family:'IBM Plex Mono',monospace;text-decoration:underline;text-underline-offset:3px;">C'est quoi Tiketo ?</a>
        </div>
      </div>
    </div>`;

  document.getElementById("f-submit").onclick = async () => {
    const prenom = document.getElementById("f-prenom").value.trim();
    const email = document.getElementById("f-email").value.trim();
    const wantsPromo = document.getElementById("f-promo").checked;
    const errEl = document.getElementById("f-err");
    errEl.textContent = "";

    if (!prenom) return errEl.textContent = "Ton prénom manque à l'appel.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return errEl.textContent = "Cette adresse email ne semble pas valide.";

    const emailLower = email.toLowerCase();
    const btn = document.getElementById("f-submit");
    btn.disabled = true; btn.textContent = "Envoi…";
    try{
      // évite un doublon pour CE tirage précis (email = clé unique par round)
      const dupSnap = await getDocs(query(
        collection(db,"participants"),
        where("drawId","==",drawId),
        where("email","==",emailLower)
      ));
      if (dupSnap.empty) {
        await addDoc(collection(db,"participants"), {
          drawId, restaurantId: id, prenom, email: emailLower, wantsPromo, ts: serverTimestamp()
        });
      }

      // met à jour la base clients PERMANENTE de ce commerçant (indépendante
      // des tirages, sert pour les promos)
      const cRef = doc(db, "clients", clientDocId(id, emailLower));
      const cSnap = await getDoc(cRef);
      await setDoc(cRef, {
        restaurantId: id, prenom, email: emailLower, wantsPromo,
        lastSeen: serverTimestamp(),
        ...(cSnap.exists() ? {} : { firstSeen: serverTimestamp() })
      }, { merge: true });

      // ancre l'identité OneSignal dès que possible (dès qu'on connaît
      // l'email), pour laisser le temps au SDK de créer son "identity model"
      // avant qu'on lui demande la permission push / les tags juste après.
      let OneSignalEarly = window.__oneSignalReady;
      let earlyTries = 0;
      while (!OneSignalEarly && earlyTries < 20) {
        await new Promise(r => setTimeout(r, 300));
        OneSignalEarly = window.__oneSignalReady;
        earlyTries++;
      }
      if (OneSignalEarly) {
        try { await OneSignalEarly.login(emailLower); }
        catch(e) { console.warn("[tiketo] login() anticipé a échoué (non bloquant):", e); }
      }

      const formWrap = document.getElementById("ticket-form");
      const already = !dupSnap.empty;
      formWrap.innerHTML = `
        <div style="text-align:center;padding:6px 0 4px;">
          <div class="ticket-no" style="font-size:15px;color:var(--gold);animation:stampIn .5s ease;">✓ ENREGISTRÉ</div>
          <p class="display" style="font-size:20px;margin:6px 0 4px;">${already ? "Tu participes déjà à ce tirage !" : "Ticket confirmé !"}</p>
          <p style="color:var(--stone);font-size:14px;margin-bottom:18px;font-family:'IBM Plex Mono',monospace;">Résultat annoncé par email si tu gagnes.</p>
          <button class="btn btn-primary" style="width:100%;" id="push-btn">🔔 Accepter les notifications pour recevoir la réponse plus vite</button>
        </div>`;

      document.getElementById("push-btn").onclick = async () => {
        const pushBtn = document.getElementById("push-btn");
        pushBtn.disabled = true; pushBtn.textContent = "…";

        let OneSignal = window.__oneSignalReady;
        let tries = 0;
        while (!OneSignal && tries < 20) {
          await new Promise(r => setTimeout(r, 300));
          OneSignal = window.__oneSignalReady;
          tries++;
        }
        if (!OneSignal) {
          pushBtn.disabled = false;
          pushBtn.textContent = window.__oneSignalInitError
            ? ("Erreur : " + window.__oneSignalInitError).slice(0, 60)
            : "Notifications indisponibles, réessaie";
          return;
        }
        try {
          await OneSignal.Notifications.requestPermission();

          if (OneSignal.Notifications.permission !== true) {
            pushBtn.disabled = false;
            pushBtn.textContent = "Notifications refusées dans le navigateur";
            return;
          }

          let subId = OneSignal.User.PushSubscription.id;
          let waitTries = 0;
          while (!subId && waitTries < 15) {
            await new Promise(r => setTimeout(r, 400));
            subId = OneSignal.User.PushSubscription.id;
            waitTries++;
          }

          const externalId = emailLower;
          try { await OneSignal.login(externalId); } catch(e) { console.warn("[tiketo] login() de secours a échoué:", e); }

          // un seul tag, faible cardinalité — reste dans le quota gratuit
          const tagPayload = { resto_id: id };
          try { await OneSignal.User.addTags(tagPayload); } catch(e) { console.warn("[tiketo] addTags client a échoué (non bloquant):", e); }

          const setTagsRes = await fetch("/api/set-tags", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ external_id: externalId, tags: tagPayload })
          });
          const setTagsData = await setTagsRes.json().catch(() => ({}));
          if (!setTagsRes.ok) throw new Error(setTagsData?.error || "échec de la pose des tags côté serveur");

          pushBtn.textContent = "🔔 Notifications activées, merci !";
        } catch (e) {
          pushBtn.disabled = false;
          let msg = (e && e.message) ? e.message : "";
          if (!msg) { try { msg = JSON.stringify(e); } catch(_) { msg = ""; } }
          if (!msg || msg === "{}" || msg === "undefined") msg = "problème inconnu, réessaie";
          pushBtn.textContent = ("Erreur : " + msg).slice(0, 70);
          console.error("[tiketo] push opt-in failed:", e);
        }
      };
    }catch(e){
      errEl.textContent = "Le ticket n'a pas pu être enregistré. Réessaie.";
      btn.disabled = false; btn.textContent = "Valider mon ticket";
    }
  };
}

function statChip(label, value){
  return `<div class="card" style="padding:12px 18px;flex:1;min-width:120px;text-align:center;">
    <div class="ticket-no" style="font-size:26px;color:var(--stamp);">${value}</div>

async function loadList(){
  const [rSnap, cSnap] = await Promise.all([
    getDocs(collection(db,"restaurants")),
    getDocs(collection(db,"clients"))
  ]);
  allClientCounts = {};
  cSnap.forEach(d => { const rid = d.data().restaurantId; allClientCounts[rid] = (allClientCounts[rid]||0)+1; });
  allRestos = rSnap.docs.map(d => ({ id: d.id, data: d.data() }));

  document.getElementById("stats-bar").innerHTML =
    statChip("Commerçants", allRestos.length) + statChip("Clients", cSnap.size);
  document.getElementById("search-wrap").classList.toggle("hidden", allRestos.length < 5);

  renderList("");
}

function renderList(filterText){
  const listEl = document.getElementById("list");
  const f = filterText.trim().toLowerCase();
  const items = allRestos.filter(({data}) => !f || data.name.toLowerCase().includes(f));

  if (allRestos.length === 0){
    listEl.innerHTML = `<div class="card anim-rise" style="text-align:center;">
      <p class="display" style="font-size:18px;">Aucun commerçant pour l'instant</p>
      <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">Crée ton premier commerçant pour générer son QR code.</p>
    </div>`;
    return;
  }
  if (items.length === 0){
    listEl.innerHTML = `<div class="card" style="text-align:center;color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Aucun résultat pour "${esc(filterText)}".</div>`;
    return;
  }

  listEl.innerHTML = "";
  items.forEach(({id, data}, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "card resto-card anim-rise";
    wrap.style.padding = "0";
    wrap.style.animationDelay = `${Math.min(idx*40,240)}ms`;
    const ticketNo = String(id).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");
    wrap.innerHTML = `
      <div class="resto-header" style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px;cursor:pointer;gap:14px;">
        <div style="display:flex;align-items:center;gap:16px;min-width:0;">
          <div class="ticket-no" style="font-size:26px;color:var(--carbon);flex-shrink:0;">${esc(ticketNo)}</div>
          <div style="min-width:0;">
            <span class="stamp">${allClientCounts[id]||0} client(s)</span>
            <h3 class="display" style="font-size:19px;margin:8px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(data.name)}</h3>
          </div>
        </div>
        <button class="btn btn-secondary del-btn" style="padding:8px 12px;flex-shrink:0;">🗑️</button>
      </div>
      <div class="resto-body" style="display:none;padding:0 20px 20px;"></div>
    `;
    const header = wrap.querySelector(".resto-header");
    const body = wrap.querySelector(".resto-body");
    const delBtn = wrap.querySelector(".del-btn");

    header.onclick = async () => {
      if (body.style.display === "none") {
        body.style.display = "block";
        body.innerHTML = `<p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p>`;
        try { await renderDetailInline(id, data, body); }
        catch(e){ body.innerHTML = `<p class="err">Erreur : ${esc(e?.message || String(e))}</p>`; }
      } else {
        if (body._unsub) { body._unsub.forEach(u => u()); body._unsub = null; }
        body.style.display = "none";
        body.innerHTML = "";
      }
    };

    delBtn.onclick = async (ev) => {
      ev.stopPropagation();
      if (!confirm(`Supprimer "${data.name}" ? Cette action est définitive.`)) return;
      delBtn.disabled = true; delBtn.textContent = "…";
      try {
        await deleteDoc(doc(db, "restaurants", id));
        toast(`"${data.name}" supprimé`);
        await loadList();
      } catch(err) {
        alert("Erreur suppression : " + (err?.message || String(err)));
        delBtn.disabled = false; delBtn.textContent = "🗑️";
      }
    };

    listEl.appendChild(wrap);
  });
}

      <button class="btn btn-primary send-win-btn" style="width:100%;margin-bottom:8px;">🏆 Envoyer au gagnant</button>

      <input type="text" class="promo-title" placeholder="Titre (ex: -20% ce week-end !)" style="margin-bottom:8px;">
      <textarea class="promo-message" placeholder="Message (ex: Reviens nous voir, offre valable jusqu'à dimanche)" rows="2" style="width:100%;padding:10px;border-radius:3px;border:1.5px solid var(--line);font-size:14px;box-sizing:border-box;resize:vertical;margin-bottom:8px;"></textarea>

  container.querySelector(".dl-qr-btn").onclick = () => {
    const a = document.createElement("a");
    a.href = qrUrl;
    a.download = `qr-${data.name.replace(/[^a-z0-9]+/gi,"-")}.png`;
    document.body.appendChild(a); a.click(); a.remove();
  };

  const reload = async () => {
    if (container._unsub) { container._unsub.forEach(u => u()); container._unsub = null; }
    container.innerHTML = `<p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p>`;
    await renderDetailInline(id, data, container);
    await loadList();
  };

  const newDrawBtn = container.querySelector(".new-draw-btn");
  if (newDrawBtn) newDrawBtn.onclick = () => openNewDrawModal(id, data.name, openDraw?.id, reload);
  const newDrawBtn2 = container.querySelector(".new-draw-btn2");
  if (newDrawBtn2) newDrawBtn2.onclick = () => openNewDrawModal(id, data.name, null, reload);

  }
  const clientsUnsub = onSnapshot(query(collection(db,"clients"), where("restaurantId","==",id)), (snap) => {
    clients = snap.docs.map(d => d.data());
    renderClientsList();
  }, (err) => {
    container.querySelector(".clients-list").innerHTML = `<p class="err">Erreur temps réel : ${esc(err?.message || String(err))}</p>`;
  });

  container.querySelector(".copy-list-btn").onclick = async () => {
    const btn = container.querySelector(".copy-list-btn");
    if (clients.length === 0) { btn.textContent = "Vide"; setTimeout(()=>btn.textContent="📋 Copier",1200); return; }
    const text = clients.map(c => `${c.prenom}\t${c.email}`).join("\n");
    try{ await navigator.clipboard.writeText(text); btn.textContent = "Copié !"; toast("Liste copiée"); setTimeout(()=>btn.textContent="📋 Copier",1500); }
    catch{ btn.textContent = "Erreur copie"; }

  container.querySelector(".csv-btn").onclick = () => {
    if (clients.length === 0) return;
    const header = "prenom,email,veut_promo\n";
    const rows = clients.map(c =>
      [c.prenom, c.email, c.wantsPromo ? "oui" : "non"]
        .map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")
    ).join("\n");
    const blob = new Blob([header + rows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `clients-${data.name.replace(/[^a-z0-9]+/gi,"-")}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast("CSV téléchargé");
  };

  container.querySelector(".send-promo-btn").onclick = async () => {
    const btn = container.querySelector(".send-promo-btn");
    const statusEl = container.querySelector(".promo-status");
    const title = container.querySelector(".promo-title").value.trim();
    const message = container.querySelector(".promo-message").value.trim();
    if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "promo-status err"; return; }

    const targets = [...new Set(clients.filter(c => c.wantsPromo && c.email).map(c => c.email.toLowerCase()))];
    if (targets.length === 0) { statusEl.textContent = "Personne n'a encore accepté de recevoir des offres."; statusEl.className = "promo-status err"; return; }

    btn.disabled = true; btn.textContent = "Envoi…";
    statusEl.textContent = ""; statusEl.className = "promo-status";
    try {
      const r = await fetch("/api/send-promo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ external_ids: targets, title, message, resto_id: id, origin: window.location.origin })
      });
      const out = await r.json();
      if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
      statusEl.textContent = `Envoyée à ${targets.length} client(s) — vérification en cours…`;
      statusEl.style.color = "var(--stone)";
      toast("Promo envoyée");
      pollDelivery(out.notification_ids, targets.length, statusEl);
    } catch (e) {
      statusEl.textContent = "Erreur : " + (e?.message || String(e));
      statusEl.className = "promo-status err";
    } finally {
      btn.disabled = false; btn.textContent = "Envoyer aux clients qui ont accepté les offres";
    }
  };

  async function pollDelivery(ids, targeted, statusEl){
    if (!ids || !ids.length) return;
    setTimeout(async () => {
      try {
        let successful = 0;
        for (const nid of ids) {
          const chk = await fetch("/api/check-notification", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ notification_id: nid })
          });
          const chkData = await chk.json();
          if (chk.ok && typeof chkData.successful === "number") successful += chkData.successful;
        }
        statusEl.textContent = `Livrée à ${successful} sur ${targeted} ciblé(s) ✅`;
        statusEl.style.color = "var(--stamp)";
      } catch(_) { /* on laisse le message provisoire si la vérif échoue */ }
    }, 4000);
  }

  if (!openDraw) return; // pas de tirage actif : rien de plus à câbler

  // ---- participants du tirage en cours (pour tirage au sort) ----
  let drawParticipants = [];
  const drawUnsub = onSnapshot(query(collection(db,"participants"), where("drawId","==",openDraw.id)), (snap) => {
    drawParticipants = snap.docs.map(d => d.data());
    const el = container.querySelector(".live-draw-count");
    if (el) el.textContent = `(${drawParticipants.length})`;
  });

  container._unsub = [clientsUnsub, drawUnsub];

  container.querySelector(".draw-btn").onclick = () => {
    const box = container.querySelector(".winner-box");
    if (drawParticipants.length === 0){ box.textContent = "Aucun participant pour l'instant sur ce tirage."; return; }
    let i = 0;
    const spin = setInterval(() => {
      const w = drawParticipants[Math.floor(Math.random()*drawParticipants.length)];
      box.innerHTML = `<div style="text-align:center;padding:16px 0;background:var(--paper-deep);border-radius:6px;">
        <p class="mono" style="font-size:11px;color:var(--stone);margin:0;letter-spacing:.1em;">TIRAGE EN COURS...</p>
        <p class="display" style="font-size:24px;color:var(--carbon);margin:4px 0;">${esc(w.prenom)}</p>
      </div>`;
      i++;
      if (i > 16){
        clearInterval(spin);
        box.innerHTML = `<div class="winner-reveal" style="text-align:center;padding:18px 0;background:var(--paper-deep);border-radius:6px;">
          <p class="mono" style="font-size:11px;color:var(--gold);margin:0;letter-spacing:.14em;">🎉 GAGNANT 🎉</p>
          <p class="display" style="font-size:28px;color:var(--stamp);margin:6px 0;animation:stampIn .5s ease;">${esc(w.prenom)}</p>
          <p class="mono" style="font-size:13px;color:var(--stone);margin:0;">${esc(w.email)}</p>
        </div>`;
        confettiBurst(box.querySelector(".winner-reveal"));

        updateDoc(doc(db,"draws",openDraw.id), { winner: { prenom: w.prenom, email: w.email } }).catch(()=>{});

        const msgsWrap = container.querySelector(".winner-msgs");
        msgsWrap.classList.remove("hidden");
        const winTitleEl = container.querySelector(".win-title");
        const winMsgEl = container.querySelector(".win-message");
        const loseTitleEl = container.querySelector(".lose-title");
        const loseMsgEl = container.querySelector(".lose-message");
        if (!winTitleEl.value.trim()) winTitleEl.value = `Tu as gagné ! — ${data.name}`;
        if (!winMsgEl.value.trim()) winMsgEl.value = `🎉 Félicitations ${w.prenom} ! Tu as gagné : ${openDraw.prize}. Passe le récupérer chez ${data.name}.`;
        if (!loseTitleEl.value.trim()) loseTitleEl.value = `Résultat du tirage — ${data.name}`;
        if (!loseMsgEl.value.trim()) loseMsgEl.value = `Le gagnant est ${w.prenom}. Merci d'avoir participé, à bientôt pour le prochain tirage chez ${data.name} !`;

        container.querySelector(".send-win-btn").onclick = async () => {
          const btn = container.querySelector(".send-win-btn");
          const statusEl = container.querySelector(".win-status");
          const title = winTitleEl.value.trim(), message = winMsgEl.value.trim();
          if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "win-status err"; return; }
          btn.disabled = true; btn.textContent = "Envoi…";
          statusEl.textContent = ""; statusEl.className = "win-status";
          try {
            const r = await fetch("/api/send-promo", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ external_ids: [w.email.toLowerCase()], title, message, resto_id: id, origin: window.location.origin, result: "win" })
            });
            const out = await r.json();
            if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
            statusEl.textContent = "Envoyée au gagnant — vérification en cours…";
            statusEl.style.color = "var(--stone)";
            pollDelivery(out.notification_ids, 1, statusEl);
          } catch(e) {
            statusEl.textContent = "Erreur : " + (e?.message || String(e));
            statusEl.className = "win-status err";
          } finally {
            btn.disabled = false; btn.textContent = "🏆 Envoyer au gagnant";
          }
        };

        container.querySelector(".send-lose-btn").onclick = async () => {
          const btn = container.querySelector(".send-lose-btn");
          const statusEl = container.querySelector(".lose-status");
          const title = loseTitleEl.value.trim(), message = loseMsgEl.value.trim();
          if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "lose-status err"; return; }
          const losers = [...new Set(drawParticipants.filter(p => p.email.toLowerCase() !== w.email.toLowerCase()).map(p => p.email.toLowerCase()))];
          if (losers.length === 0) { statusEl.textContent = "Aucun autre participant à prévenir."; statusEl.className = "lose-status err"; return; }
          btn.disabled = true; btn.textContent = "Envoi…";
          statusEl.textContent = ""; statusEl.className = "lose-status";
          try {
            const r = await fetch("/api/send-promo", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ external_ids: losers, title, message, resto_id: id, origin: window.location.origin, result: "lose" })
            });
            const out = await r.json();
            if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
            statusEl.textContent = `Envoyée à ${losers.length} participant(s) — vérification en cours…`;
            statusEl.style.color = "var(--stone)";
            pollDelivery(out.notification_ids, losers.length, statusEl);
          } catch(e) {
            statusEl.textContent = "Erreur : " + (e?.message || String(e));
            statusEl.className = "lose-status err";
          } finally {
            btn.disabled = false; btn.textContent = "📣 Envoyer aux autres";
          }
        };
      }
    }, 90);
  };
}
</script>
</body>
</html>
