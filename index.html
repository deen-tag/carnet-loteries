<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Big+Shoulders+Stencil:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#EDE3C8;        /* kraft ticket stock */
    --paper-deep:#E1D3A9;   /* shadowed stub tone */
    --surface:#F7F1DF;      /* raised card surface */
    --ink:#20291F;          /* deep ink */
    --stamp:#A8341F;        /* postal-ink red — primary accent */
    --carbon:#2E4A63;       /* carbon-copy blue — secondary accent */
    --gold:#B98A1D;         /* foil gold — prize / winner */
    --stone:#857A63;        /* muted stone */
    --line: rgba(32,41,31,.16);
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  body{margin:0;font-family:'Fraunces',serif;background:
      radial-gradient(1200px 600px at 10% -10%, #F3E9CE 0%, transparent 60%),
      var(--paper-deep);
    color:var(--ink);min-height:100vh;}
  body, input, textarea, button{font-family:'Fraunces',serif;}
  .sans{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Fraunces',serif;font-optical-sizing:auto;}
  .stencil{font-family:'Big Shoulders Stencil',sans-serif;font-weight:800;letter-spacing:.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .stamp{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--stamp);color:var(--stamp);padding:3px 11px 3px 9px;border-radius:999px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;transform:rotate(-2deg);font-family:'IBM Plex Mono',monospace;font-weight:600;background:rgba(168,52,31,.06);}
  .stamp::before{content:"●";font-size:8px;}
  .stamp-blue{border-color:var(--carbon);color:var(--carbon);background:rgba(46,74,99,.06);}
  .stamp-gold{border-color:var(--gold);color:var(--gold);background:rgba(185,138,29,.08);}

  .card{background:var(--surface);border-radius:6px;padding:24px;box-shadow:0 1px 0 var(--line), 0 12px 24px -14px rgba(32,41,31,.35);position:relative;}

  /* ---- signature: die-cut perforation tear line (duplicate ticket-book motif) ---- */
  .perf{
    position:relative;height:20px;margin:20px -24px;
    background-image: radial-gradient(circle 6px, var(--paper-deep) 6px, transparent 6.3px);
    background-repeat:repeat-x; background-position:10px center; background-size:22px 20px;
  }
  .perf::before,.perf::after{content:"";position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--paper-deep);}
  .perf::before{left:-11px;} .perf::after{right:-11px;}
  .perf-label{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--surface);padding:0 10px;font-size:9px;letter-spacing:.14em;color:var(--stone);white-space:nowrap;}

  .btn{border:none;border-radius:3px;padding:13px 18px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.02em;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--stamp);color:#fff;box-shadow:0 2px 0 #7A2517;}
  .btn-primary:hover{box-shadow:0 3px 0 #7A2517;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.6;cursor:default;transform:none;box-shadow:0 2px 0 #7A2517;}
  .btn-secondary{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
  .btn-secondary:hover{background:var(--ink);color:var(--paper);}
  .btn-ghost{background:transparent;border:none;color:var(--carbon);text-decoration:underline;text-underline-offset:3px;padding:6px 4px;}

  input[type=text],input[type=email]{width:100%;padding:11px 12px;border-radius:3px;border:1.5px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:14px;background:#fff;color:var(--ink);transition:border-color .15s ease, box-shadow .15s ease;}
  input[type=text]:focus,input[type=email]:focus,textarea:focus{outline:none;border-color:var(--stamp);box-shadow:0 0 0 3px rgba(168,52,31,.12);}
  textarea{font-family:'IBM Plex Mono',monospace;}
  label.field{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);font-weight:600;margin-bottom:7px;font-family:'IBM Plex Mono',monospace;}
  .err{color:var(--stamp);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  a{color:var(--carbon);}

  .grid{display:flex;flex-direction:column;gap:16px;}
  .resto-card{cursor:pointer;text-align:left;border:none;overflow:hidden;transition:box-shadow .2s ease;}
  .resto-card:hover{box-shadow:0 1px 0 var(--line), 0 16px 30px -16px rgba(32,41,31,.45);}
  .modal-bg{position:fixed;inset:0;background:rgba(32,41,31,.6);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:10;animation:fadeIn .18s ease;}
  .hidden{display:none !important;}
  .participant-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 12px;background:#fff;border-radius:3px;border:1px solid var(--line);margin-bottom:6px;flex-wrap:wrap;gap:6px;font-family:'IBM Plex Mono',monospace;animation:rise .25s ease both;}
  .history-row{padding:12px 14px;background:#fff;border-radius:3px;border:1px solid var(--line);margin-bottom:8px;}

  details.section > summary{cursor:pointer;list-style:none;font-family:'Fraunces',serif;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
  details.section > summary::-webkit-details-marker{display:none;}
  details.section > summary::after{content:"▾";font-family:'IBM Plex Mono',monospace;color:var(--stone);font-size:13px;transition:transform .15s ease;}
  details.section[open] > summary::after{transform:rotate(180deg);}
  details.section{margin:4px 0;}

  .ticket-no{font-family:'Big Shoulders Stencil',sans-serif;font-weight:800;line-height:.85;color:var(--ink);}

  .winners-scroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:2px 2px 10px;margin:0 -2px;scrollbar-width:thin;}
  .winners-scroll::-webkit-scrollbar{height:5px;}
  .winners-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
  .win-ticket{scroll-snap-align:start;flex:0 0 auto;width:132px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:12px 14px 12px 12px;margin-right:12px;position:relative;box-shadow:0 1px 0 var(--line), 0 8px 16px -12px rgba(32,41,31,.35);}
  .win-ticket::after{content:"";position:absolute;top:0;right:-1px;bottom:0;width:9px;background-image:radial-gradient(circle 4px, var(--paper-deep) 4px, transparent 4.3px);background-repeat:repeat-y;background-position:center 8px;background-size:18px 18px;}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes stampIn{0%{opacity:0;transform:scale(2.2) rotate(-8deg);}70%{opacity:1;}100%{opacity:1;transform:scale(1) rotate(-2deg);}}
  @keyframes confettiFall{to{transform:translateY(120px) rotate(var(--r));opacity:0;}}
  .anim-rise{animation:riseIn .5s cubic-bezier(.2,.8,.2,1) both;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<div id="app" style="max-width:760px;margin:0 auto;padding:32px 20px 80px;"></div>

<script type="module">
/* ============================================================
   🔧 CONFIGURATION FIREBASE — remplace les valeurs ci-dessous
   par celles de TON projet Firebase (Console Firebase >
   Paramètres du projet > Tes applications > SDK config).
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD6VGuVkh0Xb23JQnRDjc2apRumJyPgxYI",
  authDomain: "carnet-loteries.firebaseapp.com",
  projectId: "carnet-loteries",
  storageBucket: "carnet-loteries.firebasestorage.app",
  messagingSenderId: "525322331265",
  appId: "1:525322331265:web:a5df784e1b0e079a62d980"
};
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail,
  EmailAuthProvider, reauthenticateWithCredential, updatePassword, verifyBeforeUpdateEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, getDoc, query, where,
  serverTimestamp, deleteDoc, doc, setDoc, updateDoc, onSnapshot, getCountFromServer
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const $app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);
const restoId = params.get("resto");
const SUPER_ADMIN_EMAIL = "deentag.pro@gmail.com";

function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
// code court et facile à relire à l'oral en cas de souci de scan (sans 0/O/1/I ambigus)
function genWinnerCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let out = "";
  for (let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function clientDocId(rid, email){ return `${rid}_${email.trim().toLowerCase()}`; }

function toast(msg, ms=2200){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), ms);
}

function confettiBurst(container){
  const colors = ["#A8341F","#2E4A63","#B98A1D","#20291F"];
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:absolute;inset:0;overflow:hidden;pointer-events:none;border-radius:6px;";
  for (let i=0;i<28;i++){
    const p = document.createElement("span");
    const x = Math.random()*100;
    const rot = (Math.random()*360)|0;
    const delay = Math.random()*150;
    const size = 5 + Math.random()*5;
    p.style.cssText = `position:absolute;left:${x}%;top:-10px;width:${size}px;height:${size*.5}px;background:${colors[i%colors.length]};opacity:.95;transform:rotate(${rot}deg);animation:confettiFall ${900+Math.random()*500}ms ease-in ${delay}ms forwards;--r:${rot+180}deg;`;
    wrap.appendChild(p);
  }
  container.style.position = "relative";
  container.appendChild(wrap);
  setTimeout(()=>wrap.remove(), 1700);
}

// ---------- CONFIG CHECK ----------
function configMissing(){
  return Object.values(firebaseConfig).some(v => String(v).includes("REMPLACE_MOI"));
}

// ---------- FILET DE SÉCURITÉ GÉNÉRIQUE ----------
// Si un rendu plante (Firestore, réseau, permissions...), on affiche un
// message clair avec un bouton "Réessayer" plutôt que de laisser l'écran
// bloqué sur "Chargement…" indéfiniment.
function showFatalError(e){
  console.error("[tiketo] erreur:", e);
  $app.style.display = ""; $app.style.alignItems = ""; $app.style.justifyContent = ""; $app.style.minHeight = "";
  $app.innerHTML = `
    <div class="card anim-rise" style="text-align:center;max-width:380px;margin:40px auto;">
      <span class="stamp">Erreur</span>
      <h1 class="display" style="font-size:20px;margin:12px 0 8px;">Un problème est survenu</h1>
      <p style="color:var(--stone);font-size:13px;font-family:'IBM Plex Mono',monospace;">${esc(e?.message || String(e))}</p>
      <button class="btn btn-primary" style="margin-top:14px;width:100%;" id="fatal-retry">Réessayer</button>
    </div>`;
  document.getElementById("fatal-retry").onclick = () => location.reload();
}
async function safeRun(fn){
  try { await fn(); }
  catch(e){ showFatalError(e); }
}

// ---------- DÉMARRAGE ----------
// Regroupé dans une fonction et appelé en tout dernier (voir bas de fichier),
// une fois que toutes les fonctions ET constantes du script sont déclarées.
// Ça évite les bugs "Cannot access ... before initialization" si une route
// est ajoutée ici avant que sa constante ne soit définie plus bas.
function init(){
  if (configMissing()) {
    $app.innerHTML = `
      <div class="card anim-rise">
        <span class="stamp">Configuration requise</span>
        <h1 class="display" style="font-size:24px;margin:12px 0 8px;">Il manque ta configuration Firebase</h1>
        <p style="color:var(--stone);font-size:14px;">
          Ouvre <span class="mono">index.html</span>, trouve le bloc <span class="mono">firebaseConfig</span>
          tout en haut du script, et remplace les valeurs "REMPLACE_MOI" par celles de ton projet Firebase
          (Console Firebase → Paramètres du projet → Tes applications → SDK config). Voir le README.
        </p>
      </div>`;
  } else if (params.get("about") === "1") {
    safeRun(renderAbout);
  } else if (params.get("winners") === "1") {
    safeRun(renderWinnersSearch);
  } else if (restoId) {
    safeRun(() => renderPublic(restoId));
  } else if (params.get("admin") === "1") {
    safeRun(renderAdminGate);
  } else if (params.get("legal")) {
    safeRun(() => renderLegal(params.get("legal")));
  } else {
    safeRun(renderHome);
  }
}

// ================= PROTECTION ADMIN (Firebase Authentication) =================
function renderAdminGate(){
  onAuthStateChanged(auth, (user) => {
    if (user) { renderAdmin(user).catch(showFatalError); return; }
    document.body.style.background = "var(--ink)";
    $app.style.display="flex"; $app.style.alignItems="center"; $app.style.justifyContent="center"; $app.style.minHeight="100vh";
    $app.innerHTML = `
      <div style="width:100%;max-width:360px;" class="anim-rise">
        <div class="card" style="border-radius:8px;text-align:center;">
          <img src="logo.png" alt="Tiketo" style="height:85px;margin-bottom:18px;">
          <h1 class="display" style="font-size:20px;margin:0 0 16px;">Espace pro</h1>
          <input type="text" id="gate-email" placeholder="Email ou pseudo" style="margin-bottom:10px;" autocomplete="username">
          <input type="text" id="gate-pass" placeholder="Mot de passe" style="margin-bottom:6px;" autocomplete="current-password">
          <p style="text-align:right;margin:0 0 10px;"><a href="#" id="gate-forgot" style="font-size:12px;color:var(--stone);">Mot de passe oublié ?</a></p>
          <p id="gate-err" class="err" style="margin-bottom:10px;"></p>
          <button class="btn btn-primary" id="gate-submit" style="width:100%;">Se connecter</button>
        </div>
      </div>`;
    const emailEl = document.getElementById("gate-email");
    const passEl = document.getElementById("gate-pass");
    passEl.type = "password";
    emailEl.focus();
    const errEl = document.getElementById("gate-err");

    async function resolveLoginEmail(input){
      const v = input.trim();
      if (v.includes("@")) return v.toLowerCase();
      // c'est un pseudo : on va chercher l'email réel associé
      const uSnap = await getDoc(doc(db,"usernames",v.toLowerCase()));
      if (!uSnap.exists()) throw new Error("Identifiant inconnu.");
      return uSnap.data().email;
    }

    document.getElementById("gate-forgot").onclick = async (e) => {
      e.preventDefault();
      errEl.style.color = "";
      if (!emailEl.value.trim()) { errEl.textContent = "Renseigne d'abord ton email ou pseudo ci-dessus."; return; }
      try {
        const realEmail = await resolveLoginEmail(emailEl.value);
        await sendPasswordResetEmail(auth, realEmail);
        errEl.style.color = "var(--gold)";
        errEl.textContent = "Email envoyé — vérifie ta boîte de réception.";
      } catch(e2) {
        errEl.textContent = e2?.code === "auth/user-not-found" ? "Aucun compte avec cet email." : (e2?.message || "Erreur, réessaie.");
      }
    };
    const submit = async () => {
      const btn = document.getElementById("gate-submit");
      errEl.textContent = ""; errEl.style.color = "";
      btn.disabled = true; btn.textContent = "…";
      try {
        const realEmail = await resolveLoginEmail(emailEl.value);
        await signInWithEmailAndPassword(auth, realEmail, passEl.value);
        // onAuthStateChanged prendra le relais et affichera l'admin
      } catch(e) {
        const msg = e?.code === "auth/invalid-credential" ? "Email/pseudo ou mot de passe incorrect." : (e?.message || "Erreur de connexion.");
        errEl.textContent = msg;
        btn.disabled = false; btn.textContent = "Se connecter";
      }
    };
    document.getElementById("gate-submit").onclick = submit;
    passEl.onkeydown = (e) => { if (e.key === "Enter") submit(); };
    emailEl.onkeydown = (e) => { if (e.key === "Enter") passEl.focus(); };
  });
}

    </div>

      <span class="mono" style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--carbon);display:block;margin-bottom:10px;">Le parcours</span>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span class="ticket-no" style="font-size:16px;color:var(--gold);min-width:28px;">01</span>
          <div><strong style="font-family:'Fraunces',serif;font-size:14.5px;">Tu découvres un tirage</strong><p style="margin:2px 0 0;font-size:13px;color:var(--stone);">Une affiche, un QR code, chez un commerçant.</p></div>
        </div>
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span class="ticket-no" style="font-size:16px;color:var(--gold);min-width:28px;">02</span>
          <div><strong style="font-family:'Fraunces',serif;font-size:14.5px;">Tu tentes ta chance</strong><p style="margin:2px 0 0;font-size:13px;color:var(--stone);">Gratuitement, sans rien acheter, en 10 secondes.</p></div>
        </div>
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span class="ticket-no" style="font-size:16px;color:var(--gold);min-width:28px;">03</span>
          <div><strong style="font-family:'Fraunces',serif;font-size:14.5px;">Le tirage a lieu</strong><p style="margin:2px 0 0;font-size:13px;color:var(--stone);">À la date annoncée par le commerçant.</p></div>
        </div>
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span class="ticket-no" style="font-size:16px;color:var(--gold);min-width:28px;">04</span>
          <div><strong style="font-family:'Fraunces',serif;font-size:14.5px;">Tu gagnes, peut-être</strong><p style="margin:2px 0 0;font-size:13px;color:var(--stone);">Résultat par email et notification, immédiat.</p></div>
        </div>
      </div>
    </div>

    <div class="perf" style="margin:0 -20px 26px;"></div>

    <div class="card anim-rise" style="padding:0;overflow:hidden;margin-bottom:26px;">
      <div style="padding:20px 20px 16px;">
        <span class="mono" style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--stamp);display:block;margin-bottom:8px;">Pour toi</span>
        <h3 class="display" style="font-size:17px;margin:0 0 8px;">Une chance de gagner. Rien à acheter.</h3>
        <p style="font-size:13.5px;line-height:1.7;color:var(--ink);margin:0;">Pas besoin de dépenser pour participer. Juste l'envie de tenter ta chance chez un commerce que tu fréquentes ou que tu découvres.</p>
      </div>
      <div class="perf" style="margin:0 -20px;"></div>

async function fetchRecentWinners(limitN){
  // Volume faible (un tirage actif à la fois par commerce) : un filtre/tri
  // côté client suffit, pas besoin d'index Firestore ni de pagination ici.
  const drawsSnap = await getDocs(query(collection(db,"draws"), where("status","==","closed")));
  const rows = drawsSnap.docs
    .map(d => d.data())
    .filter(d => d.winner && d.closedAt)
    .sort((a,b) => (b.closedAt?.toMillis?.()||0) - (a.closedAt?.toMillis?.()||0))
    .slice(0, limitN);

  if (rows.length === 0) return [];

  const restoIds = [...new Set(rows.map(r => r.restaurantId))];
  const restoNames = {};
  await Promise.all(restoIds.map(async (rid) => {
    const s = await getDoc(doc(db,"restaurants",rid));
    restoNames[rid] = s.exists() ? s.data().name : "Commerce";
  }));

  return rows.map(r => ({
    prenom: r.winner.prenom,
    resto: restoNames[r.restaurantId] || "Commerce",
    date: r.closedAt?.toDate ? r.closedAt.toDate().toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" }) : "",
    prize: r.prize
  }));
}

async function renderWinnersSearch(){
  document.body.style.background = "";
  $app.style.display = ""; $app.style.alignItems = ""; $app.style.justifyContent = ""; $app.style.minHeight = "";
  $app.innerHTML = `
    <div class="anim-rise" style="margin-bottom:22px;">
      <a href="?" style="font-size:12px;color:var(--stone);font-family:'IBM Plex Mono',monospace;text-decoration:underline;text-underline-offset:3px;">← Retour à l'accueil</a>
    </div>
    <div class="anim-rise" style="margin-bottom:20px;">
      <span class="stamp">🎟 vérifier un gain</span>
      <h1 class="display" style="font-size:24px;margin:14px 0 8px;">Gagnants par commerce</h1>
      <p style="color:var(--stone);font-size:13px;font-family:'IBM Plex Mono',monospace;">Tape le nom du commerce où tu as participé.</p>
    </div>
    <input type="text" id="w-search" placeholder="Ex : Pizzeria Bella" style="margin-bottom:14px;">
    <div id="w-restos"></div>
    <div id="w-results" style="margin-top:6px;"></div>
  `;

  const rSnap = await getDocs(collection(db,"restaurants"));
  const restos = rSnap.docs.map(d => ({ id: d.id, name: d.data().name }));
  const normalize = (s) => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  const restosEl = document.getElementById("w-restos");
  const resultsEl = document.getElementById("w-results");
  const searchEl = document.getElementById("w-search");
  searchEl.focus();

  async function showRestoWinners(restoId, restoName){
    resultsEl.innerHTML = `<p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p>`;
    const drawsSnap = await getDocs(query(collection(db,"draws"), where("restaurantId","==",restoId), where("status","==","closed")));
    const rows = drawsSnap.docs
      .map(d => d.data())
      .filter(d => d.winner)
      .sort((a,b) => (b.closedAt?.toMillis?.()||0) - (a.closedAt?.toMillis?.()||0));

    resultsEl.innerHTML = `<h3 class="display" style="font-size:16px;margin:18px 0 10px;">${esc(restoName)}</h3>` + (
      rows.length === 0
        ? `<p style="font-size:13px;color:var(--stone);font-family:'IBM Plex Mono',monospace;">Aucun tirage clôturé pour l'instant chez ce commerce.</p>`
        : rows.map(r => {
            const date = r.closedAt?.toDate ? r.closedAt.toDate().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}) : (r.date || "");
            const name = r.winner ? esc(r.winner.prenom) : "Gagnant";
            return `<div class="participant-row" style="align-items:flex-start;">
              <div>
                <div style="font-weight:600;font-family:'Fraunces',serif;font-size:14px;">${name}</div>
                <div style="color:var(--stone);font-size:11px;">${esc(date)}</div>
              </div>
              <div style="color:var(--stamp);font-size:11px;text-align:right;max-width:40%;">${esc(r.prize)}</div>
            </div>`;
          }).join("")
    );
  }

  function renderMatches(){
    const q = normalize(searchEl.value.trim());
    if (!q){ restosEl.innerHTML = ""; resultsEl.innerHTML = ""; return; }
    const matches = restos.filter(r => normalize(r.name).includes(q)).slice(0, 8);
    restosEl.innerHTML = matches.length === 0
      ? `<p style="font-size:12px;color:var(--stone);font-family:'IBM Plex Mono',monospace;">Aucun commerce ne correspond.</p>`
      : matches.map(r => `<button class="btn btn-secondary w-pick" data-id="${esc(r.id)}" data-name="${esc(r.name)}" style="width:100%;text-align:left;margin-bottom:6px;font-size:13px;">${esc(r.name)}</button>`).join("");
    restosEl.querySelectorAll(".w-pick").forEach(btn => {
      btn.onclick = () => showRestoWinners(btn.dataset.id, btn.dataset.name);
    });
  }
  searchEl.oninput = renderMatches;
}

async function renderPublic(id){
  document.body.style.background = "var(--ink)";
  $app.style.display="flex"; $app.style.alignItems="center"; $app.style.justifyContent="center"; $app.style.minHeight="100vh";
  $app.innerHTML = `<div class="mono" style="color:var(--paper);letter-spacing:.05em;">Chargement…</div>`;

  const rSnap = await getDoc(doc(db,"restaurants",id));
  if (!rSnap.exists()){
    $app.innerHTML = `<div class="card anim-rise" style="text-align:center;max-width:340px;">
      <span class="stamp" style="margin-bottom:10px;">Introuvable</span>
      <p class="display" style="margin:8px 0 0;">Ce commerce n'existe pas (ou plus). Vérifie le QR code.</p>
    </div>`;
    return;
  }
  const data = rSnap.data();
  const ticketNo = String(id).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");

  const isPromoClick = params.get("promo") === "1";
  const resultKind = params.get("result"); // "win" | "lose" | null

  if (isPromoClick || resultKind) {
    let heading, sub;
    if (resultKind === "win") { heading = "🎉 Bravo !"; sub = `${data.name} va te contacter pour ton lot. Merci d'avoir participé !`; }
    else if (resultKind === "lose") { heading = "Merci d'avoir participé !"; sub = `Le sort a désigné quelqu'un d'autre cette fois-ci. ${data.name} t'invite à retenter ta chance au prochain tirage — à bientôt !`; }
    else { heading = data.name; sub = "Merci d'être abonné(e) aux offres. À bientôt !"; }

    // ---- talon de vérification : uniquement si on a un vrai tirage + code ----
    let verifyBlock = "";
    if (resultKind === "win") {
      const drawId = params.get("draw"), code = params.get("code");
      if (drawId && code) {
        try {
          const dSnap = await getDoc(doc(db,"draws",drawId));
          if (dSnap.exists()) {
            const dData = dSnap.data();
            if (dData.restaurantId === id && dData.winner && dData.winner.code === code) {
              const verifyPayload = `TIKETO-VERIFY|${id}|${drawId}|${code}`;
              const verifyQr = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&color=20-29-31&data=${encodeURIComponent(verifyPayload)}`;
              verifyBlock = `
                <div class="perf" style="margin:24px -24px;"></div>
                <span class="mono" style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--gold);display:block;margin-bottom:12px;">Talon de vérification</span>
                <img src="${verifyQr}" width="150" height="150" style="border-radius:6px;border:1px solid var(--line);display:block;margin:0 auto 12px;">
                <p style="font-size:12.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:0 0 8px;">Montre ce QR au commerçant pour récupérer ton lot.</p>
                <p class="ticket-no" style="font-size:20px;color:var(--stamp);letter-spacing:.06em;margin:0;">${esc(code)}</p>
                <p style="font-size:10.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:4px 0 0;">Ou donne-lui simplement ce code.</p>`;
            }
          }
        } catch(e) { /* pas de talon si la vérif échoue — le message de base reste affiché */ }
      }
    }

    const unsubBlock = isPromoClick ? `
      <div id="unsub-wrap" style="margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);">
        <p style="font-size:11.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:0 0 10px;">Tu ne veux plus recevoir ces offres ?</p>
        <input type="email" id="unsub-email" placeholder="ton@email.com" style="margin-bottom:8px;">
        <button class="btn btn-secondary" id="unsub-btn" style="width:100%;font-size:12px;">Me désabonner</button>
        <p id="unsub-msg" style="font-size:11.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:8px 0 0;"></p>
        <p style="font-size:10.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:10px 0 0;"><a href="?legal=confidentialite" style="color:var(--stamp);">Politique de confidentialité</a></p>
      </div>` : "";
    $app.innerHTML = `
      <div style="width:100%;max-width:400px;" class="anim-rise">
        <div class="card" style="border-radius:8px;padding:0;overflow:hidden;">
          <div style="padding:20px 24px 4px;display:flex;justify-content:space-between;align-items:flex-start;">
            <img src="logo.png" alt="Tiketo" style="height:65px;">
            <span class="ticket-no" style="font-size:22px;color:var(--stamp);">N° ${esc(ticketNo)}</span>
          </div>
          <div style="padding:8px 24px 28px;text-align:center;">
            <h1 class="display" style="font-size:26px;margin:20px 0 8px;">${esc(heading)}</h1>
            <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">${esc(sub)}</p>
            ${unsubBlock}
            ${verifyBlock}
          </div>
        </div>
      </div>`;
    if (isPromoClick) {
      document.getElementById("unsub-btn").onclick = async () => {
        const em = document.getElementById("unsub-email").value.trim().toLowerCase();
        const msgEl = document.getElementById("unsub-msg");
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { msgEl.textContent = "Adresse email invalide."; return; }
        try {
          await setDoc(doc(db, "clients", clientDocId(id, em)), { wantsPromo: false }, { merge: true });
          msgEl.textContent = "C'est fait, tu ne recevras plus d'offres de ce commerce.";
        } catch (e) {
          msgEl.textContent = "Un problème est survenu, réessaie plus tard.";
        }
      };
    }
    return;
  }

  // trouve le tirage actif de ce commerçant (2 filtres d'égalité, pas besoin
  // d'index composite Firestore)
  const drawsSnap = await getDocs(query(collection(db,"draws"), where("restaurantId","==",id)));
  const openDraw = drawsSnap.docs.find(d => d.data().status === "open");

  if (!openDraw){
    $app.innerHTML = `
      <div style="width:100%;max-width:400px;" class="anim-rise">
        <div class="card" style="border-radius:8px;text-align:center;">
          <img src="logo.png" alt="Tiketo" style="height:65px;margin-bottom:14px;">
          <h1 class="display" style="font-size:24px;margin:6px 0 8px;">${esc(data.name)}</h1>
          <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">Aucun tirage en cours pour le moment. Reviens bientôt !</p>
        </div>
      </div>`;
    return;
  }
  const drawId = openDraw.id;
  const draw = openDraw.data();
  const ticketNo2 = String(drawId).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");

  $app.innerHTML = `
    <div style="width:100%;max-width:400px;" class="anim-rise">
      <div class="card" style="border-radius:8px;padding:0;overflow:hidden;">
        <div style="padding:20px 24px 4px;display:flex;justify-content:space-between;align-items:flex-start;">
          <img src="logo.png" alt="Tiketo" style="height:65px;">
          <span class="ticket-no" style="font-size:22px;color:var(--stamp);">N° ${esc(ticketNo2)}</span>
        </div>
        <div style="padding:8px 24px 0;">
          <h1 class="display" style="font-size:30px;margin:12px 0 4px;">${esc(data.name)}</h1>
          <p style="color:var(--stone);font-size:14px;margin:0 0 4px;font-family:'IBM Plex Mono',monospace;">
            À gagner : <strong style="color:var(--stamp);">${esc(draw.prize)}</strong>
            ${draw.date ? ` · Tirage le ${esc(draw.date)}` : ""}
          </p>
        </div>

        <div class="perf"><span class="perf-label mono">DÉTACHER ICI</span></div>

        <div style="padding:4px 24px 24px;">
          <div id="ticket-form">
            <label class="field">PRÉNOM</label>
            <input type="text" id="f-prenom" placeholder="Ton prénom" style="margin-bottom:16px;">
            <label class="field">EMAIL</label>
            <input type="email" id="f-email" placeholder="ton@email.com" style="margin-bottom:16px;">
            <label style="display:flex;gap:10px;font-size:13px;color:var(--stone);margin-bottom:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">
              <input type="checkbox" id="f-promo"> J'accepte de recevoir des offres de ${esc(data.name)} (facultatif)
            </label>
            <p style="font-size:10.5px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:0 0 18px;">
              En participant, tu acceptes le <a href="?legal=reglement" target="_blank" style="color:var(--stamp);">règlement du tirage</a> et notre <a href="?legal=confidentialite" target="_blank" style="color:var(--stamp);">politique de confidentialité</a>.
            </p>
            <p id="f-err" class="err"></p>
            <button class="btn btn-primary" style="width:100%;" id="f-submit">Valider mon ticket</button>
          </div>
        </div>
        <div style="text-align:center;padding:0 24px 18px;">
          <a href="?about=1" style="font-size:11px;color:var(--stone);font-family:'IBM Plex Mono',monospace;text-decoration:underline;text-underline-offset:3px;">C'est quoi Tiketo ?</a>
          ${legalFooterHtml()}
        </div>
      </div>
    </div>`;

  document.getElementById("f-submit").onclick = async () => {
    const prenom = document.getElementById("f-prenom").value.trim();
    const email = document.getElementById("f-email").value.trim();
    const wantsPromo = document.getElementById("f-promo").checked;
    const errEl = document.getElementById("f-err");
    errEl.textContent = "";

    if (!prenom) return errEl.textContent = "Ton prénom manque à l'appel.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return errEl.textContent = "Cette adresse email ne semble pas valide.";

    const emailLower = email.toLowerCase();
    const btn = document.getElementById("f-submit");
    btn.disabled = true; btn.textContent = "Envoi…";
    try{
      // évite un doublon pour CE tirage précis (email = clé unique par round)
      // — vérif faite côté serveur car la lecture directe de "participants"
      // n'est plus publique (fuite d'emails sinon).
      const dupRes = await fetch("/api/check-participant", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ drawId, email: emailLower })
      });
      const dupData = await dupRes.json().catch(() => ({}));
      let already = !!(dupRes.ok && dupData.exists);
      if (!already) {
        // ID déterministe (tirage + email) : si deux soumissions arrivent en
        // même temps, Firestore refuse la seconde écriture (règle "update: false"
        // sur un doc déjà existant) — mais on ne masque plus cette erreur en la
        // confondant avec un vrai échec d'enregistrement : si ça plante pour une
        // autre raison, on veut le voir, pas prétendre que tout s'est bien passé.
        await setDoc(doc(db, "participants", `${drawId}_${emailLower}`), {
          drawId, restaurantId: id, prenom, email: emailLower, wantsPromo, ts: serverTimestamp()
        });
      }

      // met à jour la base clients PERMANENTE de ce commerçant (indépendante
      // des tirages, sert pour les promos)
      const cRef = doc(db, "clients", clientDocId(id, emailLower));
      const cSnap = await getDoc(cRef);
      await setDoc(cRef, {
        restaurantId: id, prenom, email: emailLower, wantsPromo,
        lastSeen: serverTimestamp(),
        ...(cSnap.exists() ? {} : { firstSeen: serverTimestamp() })
      }, { merge: true });

      // ancre l'identité OneSignal dès que possible (dès qu'on connaît
      // l'email), pour laisser le temps au SDK de créer son "identity model"
      // avant qu'on lui demande la permission push / les tags juste après.
      let OneSignalEarly = window.__oneSignalReady;
      let earlyTries = 0;
      while (!OneSignalEarly && earlyTries < 20) {
        await new Promise(r => setTimeout(r, 300));
        OneSignalEarly = window.__oneSignalReady;
        earlyTries++;
      }
      if (OneSignalEarly) {
        try { await OneSignalEarly.login(emailLower); }
        catch(e) { console.warn("[tiketo] login() anticipé a échoué (non bloquant):", e); }
      }

      const formWrap = document.getElementById("ticket-form");
      formWrap.innerHTML = `
        <div style="text-align:center;padding:6px 0 4px;">
          <div class="ticket-no" style="font-size:15px;color:var(--gold);animation:stampIn .5s ease;">✓ ENREGISTRÉ</div>
          <p class="display" style="font-size:20px;margin:6px 0 4px;">${already ? "Tu participes déjà à ce tirage !" : "Ticket confirmé !"}</p>
          <p style="color:var(--stone);font-size:14px;margin-bottom:18px;font-family:'IBM Plex Mono',monospace;">Résultat annoncé par email si tu gagnes.</p>
          <button class="btn btn-primary" style="width:100%;" id="push-btn">🔔 Accepter les notifications pour recevoir la réponse plus vite</button>
        </div>`;

      document.getElementById("push-btn").onclick = async () => {
        const pushBtn = document.getElementById("push-btn");
        pushBtn.disabled = true; pushBtn.textContent = "…";

        let OneSignal = window.__oneSignalReady;
        let tries = 0;
        while (!OneSignal && tries < 20) {
          await new Promise(r => setTimeout(r, 300));
          OneSignal = window.__oneSignalReady;
          tries++;
        }
        if (!OneSignal) {
          pushBtn.disabled = false;
          pushBtn.textContent = window.__oneSignalInitError
            ? ("Erreur : " + window.__oneSignalInitError).slice(0, 60)
            : "Notifications indisponibles, réessaie";
          return;
        }
        try {
          await OneSignal.Notifications.requestPermission();

          if (OneSignal.Notifications.permission !== true) {
            pushBtn.disabled = false;
            pushBtn.textContent = "Notifications refusées dans le navigateur";
            return;
          }

          let subId = OneSignal.User.PushSubscription.id;
          let waitTries = 0;
          while (!subId && waitTries < 15) {
            await new Promise(r => setTimeout(r, 400));
            subId = OneSignal.User.PushSubscription.id;
            waitTries++;
          }

          const externalId = emailLower;
          try { await OneSignal.login(externalId); } catch(e) { console.warn("[tiketo] login() de secours a échoué:", e); }

          // un seul tag, faible cardinalité — reste dans le quota gratuit
          const tagPayload = { resto_id: id };
          try { await OneSignal.User.addTags(tagPayload); } catch(e) { console.warn("[tiketo] addTags client a échoué (non bloquant):", e); }

          const setTagsRes = await fetch("/api/set-tags", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ external_id: externalId, tags: tagPayload })
          });
          const setTagsData = await setTagsRes.json().catch(() => ({}));
          if (!setTagsRes.ok) throw new Error(setTagsData?.error || "échec de la pose des tags côté serveur");

          pushBtn.textContent = "🔔 Notifications activées, merci !";
        } catch (e) {
          pushBtn.disabled = false;
          let msg = (e && e.message) ? e.message : "";
          if (!msg) { try { msg = JSON.stringify(e); } catch(_) { msg = ""; } }
          if (!msg || msg === "{}" || msg === "undefined") msg = "problème inconnu, réessaie";
          pushBtn.textContent = ("Erreur : " + msg).slice(0, 70);
          console.error("[tiketo] push opt-in failed:", e);
        }
      };
    }catch(e){
      console.error("[tiketo] échec enregistrement ticket:", e);
      const detail = (e && e.message) ? e.message : String(e);
      errEl.textContent = "Le ticket n'a pas pu être enregistré. Réessaie. (" + detail.slice(0, 120) + ")";
      btn.disabled = false; btn.textContent = "Valider mon ticket";
    }
  };
}

// ================= ADMIN DASHBOARD =================
let allRestos = [];
let allClientCounts = {};
let currentUser = null;
let currentIsSuperAdmin = false;

async function renderAdmin(user){
  document.body.style.background = "";
  $app.style.display = ""; $app.style.alignItems = ""; $app.style.justifyContent = ""; $app.style.minHeight = "";
  currentUser = user;
  currentIsSuperAdmin = (user.email || "").toLowerCase() === SUPER_ADMIN_EMAIL;
  const isSuperAdmin = currentIsSuperAdmin;
  $app.innerHTML = `
    <div class="anim-rise" style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px;">
      <div>
        <img src="logo.png" alt="Tiketo" style="height:110px;margin-bottom:10px;">
        <p style="color:var(--stone);font-size:13px;margin:0;font-family:'IBM Plex Mono',monospace;">
          ${isSuperAdmin ? "Vue d'ensemble — tous les commerces" : esc(user.email)}
        </p>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <button class="btn btn-secondary" id="btn-account" style="font-size:12px;padding:8px 10px;">⚙️ Mon compte</button>
        <button class="btn btn-secondary" id="btn-logout" style="font-size:12px;padding:8px 10px;">Déconnexion</button>
        ${isSuperAdmin ? `<button class="btn btn-primary" id="btn-add">+ Nouveau commerce</button>` : ""}
      </div>
    </div>
    <div id="stats-bar" class="anim-rise" style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;"></div>
    <div id="search-wrap" class="anim-rise hidden" style="margin-bottom:16px;">
      <input type="text" id="search-input" placeholder="Rechercher un commerce…">
    </div>
    <div id="list" class="grid"><p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;">Chargement…</p></div>
    <div id="detail"></div>
  `;
  const addBtn = document.getElementById("btn-add");
  if (addBtn) addBtn.onclick = openAddModal;
  document.getElementById("btn-account").onclick = () => openAccountModal(user);
  document.getElementById("btn-logout").onclick = () => signOut(auth);
  document.getElementById("search-input").oninput = (e) => renderList(e.target.value);
  await loadList(user, isSuperAdmin);
}
function statChip(label, value){
  return `<div class="card" style="padding:12px 18px;flex:1;min-width:120px;text-align:center;">
    <div class="ticket-no" style="font-size:26px;color:var(--stamp);">${value}</div>
    <div class="mono" style="font-size:10px;letter-spacing:.1em;color:var(--stone);text-transform:uppercase;margin-top:2px;">${label}</div>
  </div>`;
}

async function loadList(user, isSuperAdmin){
  user = user || currentUser;
  isSuperAdmin = (isSuperAdmin !== undefined) ? isSuperAdmin : currentIsSuperAdmin;
  const rSnap = await getDocs(collection(db,"restaurants"));

  const myEmail = (user.email || "").toLowerCase();
  allRestos = rSnap.docs
    .map(d => ({ id: d.id, data: d.data() }))
    .filter(({data}) => isSuperAdmin || data.ownerUid === user.uid || (!data.ownerUid && (data.ownerEmail || "").toLowerCase() === myEmail));

  allClientCounts = {};
  if (isSuperAdmin) {
    // le super-admin peut tout lire d'un coup (autorisé par les règles Firestore)
    const cSnap = await getDocs(collection(db,"clients"));
    cSnap.forEach(d => { const rid = d.data().restaurantId; allClientCounts[rid] = (allClientCounts[rid]||0)+1; });
  } else {
    // un commerçant ne peut lire QUE ses propres clients (règles Firestore) —
    // lire la collection entière plante désormais avec "permission-denied".
    // On compte restaurant par restaurant avec une requête d'agrégation
    // (ne télécharge aucun document, juste un nombre : rapide et léger).
    await Promise.all(allRestos.map(async ({id}) => {
      const cnt = await getCountFromServer(query(collection(db,"clients"), where("restaurantId","==",id)));
      allClientCounts[id] = cnt.data().count;
    }));
  }

  document.getElementById("stats-bar").innerHTML =
    statChip(isSuperAdmin ? "Commerces" : "Ton commerce", allRestos.length) + statChip("Clients", allRestos.reduce((s,{id}) => s + (allClientCounts[id]||0), 0));
  document.getElementById("search-wrap").classList.toggle("hidden", allRestos.length < 5);

  renderList("");
}

function renderList(filterText){
  const listEl = document.getElementById("list");
  const f = filterText.trim().toLowerCase();
  const items = allRestos.filter(({data}) => !f || data.name.toLowerCase().includes(f));

  if (allRestos.length === 0){
    listEl.innerHTML = `<div class="card anim-rise" style="text-align:center;">
      <p class="display" style="font-size:18px;">Aucun commerce pour l'instant</p>
      <p style="color:var(--stone);font-size:14px;font-family:'IBM Plex Mono',monospace;">Crée ton premier commerce pour générer son QR code.</p>
    </div>`;
    return;
  }
  if (items.length === 0){
    listEl.innerHTML = `<div class="card" style="text-align:center;color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Aucun résultat pour "${esc(filterText)}".</div>`;
    return;
  }

  listEl.innerHTML = "";
  items.forEach(({id, data}, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "card resto-card anim-rise";
    wrap.style.padding = "0";
    wrap.style.animationDelay = `${Math.min(idx*40,240)}ms`;
    const ticketNo = String(id).slice(0,4).toUpperCase().replace(/[^A-Z0-9]/g,"0");
    wrap.innerHTML = `
      <div class="resto-header" style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px;cursor:pointer;gap:14px;">
        <div style="display:flex;align-items:center;gap:16px;min-width:0;">
          <div class="ticket-no" style="font-size:26px;color:var(--carbon);flex-shrink:0;">${esc(ticketNo)}</div>
          <div style="min-width:0;">
            <span class="stamp">${allClientCounts[id]||0} client(s)</span>
            <h3 class="display" style="font-size:19px;margin:8px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(data.name)}</h3>
          </div>
        </div>
        <button class="btn btn-secondary del-btn ${currentIsSuperAdmin ? "" : "hidden"}" style="padding:8px 12px;flex-shrink:0;">🗑️</button>
      </div>
      <div class="resto-body" style="display:none;padding:0 20px 20px;"></div>
    `;
    const header = wrap.querySelector(".resto-header");
    const body = wrap.querySelector(".resto-body");
    const delBtn = wrap.querySelector(".del-btn");

    header.onclick = async () => {
      if (body.style.display === "none") {
        body.style.display = "block";
        body.innerHTML = `<p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p>`;
        try { await renderDetailInline(id, data, body); }
        catch(e){ body.innerHTML = `<p class="err">Erreur : ${esc(e?.message || String(e))}</p>`; }
      } else {
        if (body._unsub) { body._unsub.forEach(u => u()); body._unsub = null; }
        body.style.display = "none";
        body.innerHTML = "";
      }
    };

    delBtn.onclick = async (ev) => {
      ev.stopPropagation();
      if (!confirm(`Supprimer "${data.name}" ? Cette action est définitive et supprime aussi tous ses tirages et clients.`)) return;
      delBtn.disabled = true; delBtn.textContent = "…";
      try {
        // nettoyage en cascade : sinon les tirages/participants/clients
        // restent orphelins dans la base pour toujours
        const [drawsSnap, clientsSnap] = await Promise.all([
          getDocs(query(collection(db,"draws"), where("restaurantId","==",id))),
          getDocs(query(collection(db,"clients"), where("restaurantId","==",id)))
        ]);
        const participantsSnaps = await Promise.all(
          drawsSnap.docs.map(d => getDocs(query(collection(db,"participants"), where("restaurantId","==",id), where("drawId","==",d.id))))
        );
        const deletions = [
          ...drawsSnap.docs.map(d => deleteDoc(doc(db,"draws",d.id))),
          ...clientsSnap.docs.map(d => deleteDoc(doc(db,"clients",d.id))),
          ...participantsSnaps.flatMap(s => s.docs.map(d => deleteDoc(doc(db,"participants",d.id))))
        ];
        await Promise.all(deletions);
        await deleteDoc(doc(db, "restaurants", id));
        toast(`"${data.name}" supprimé`);
        await loadList();
      } catch(err) {
        alert("Erreur suppression : " + (err?.message || String(err)));
        delBtn.disabled = false; delBtn.textContent = "🗑️";
      }
    };

    listEl.appendChild(wrap);
  });
}

function openVerifyWinnerModal(restoId){
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="card" style="max-width:380px;width:100%;">
      <span class="stamp stamp-gold">Vérification</span>
      <h3 class="display" style="margin:12px 0 6px;">Vérifier un gagnant</h3>
      <p style="font-size:13px;color:var(--stone);margin:0 0 16px;font-family:'IBM Plex Mono',monospace;">
        Scanne le QR affiché par le client, ou entre son code à la main.
      </p>
      <div id="vw-reader" style="border-radius:6px;overflow:hidden;border:1px solid var(--line);margin-bottom:14px;"></div>
      <p id="vw-cam-err" class="err" style="display:none;margin:0 0 12px;"></p>
      <label class="field">OU ENTRE LE CODE</label>
      <input type="text" id="vw-code" placeholder="AB2CDE" style="margin-bottom:12px;text-transform:uppercase;">
      <div id="vw-result" style="margin-bottom:10px;"></div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" style="flex:1;" id="vw-cancel">Fermer</button>
        <button class="btn btn-primary" style="flex:1;" id="vw-check">Vérifier</button>
      </div>
    </div>`;
  document.body.appendChild(bg);

  let scanner = null;
  const closeAll = () => {
    if (scanner) { try{ scanner.stop().catch(()=>{}).finally(()=>{ try{scanner.clear();}catch{} }); }catch{} }
    bg.remove();
  };
  bg.onclick = (e) => { if (e.target === bg) closeAll(); };
  document.getElementById("vw-cancel").onclick = closeAll;

  const codeInput = document.getElementById("vw-code");
  const resultEl = document.getElementById("vw-result");

  async function runVerify(rawCode, drawIdHint){
    const code = (rawCode || "").trim().toUpperCase();
    if (!code){ resultEl.innerHTML = `<p class="err" style="margin:0;">Entre ou scanne un code.</p>`; return; }
    resultEl.innerHTML = `<p style="font-size:12px;color:var(--stone);font-family:'IBM Plex Mono',monospace;margin:0;">Vérification…</p>`;
    try{
      const idToken = await auth.currentUser.getIdToken();
      // retrouve le tirage correspondant à ce code pour ce commerce si le
      // QR scanné ne l'indiquait pas déjà (cas d'une saisie manuelle)
      let drawId = drawIdHint;
      if (!drawId) {
        const snap = await getDocs(query(collection(db,"draws"), where("restaurantId","==",restoId)));
        const match = snap.docs.find(d => d.data().winner && d.data().winner.code === code);
        if (!match){ resultEl.innerHTML = `<p style="color:var(--stamp);font-family:'IBM Plex Mono',monospace;font-size:13px;margin:0;">❌ Code invalide pour ce commerce.</p>`; return; }
        drawId = match.id;
      }
      const r = await fetch("/api/verify-winner", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ idToken, resto_id: restoId, drawId, code })
      });
      const out = await r.json();
      if (out.ok){
        resultEl.innerHTML = `<div class="winner-reveal" style="text-align:center;padding:16px 0;background:var(--paper-deep);border-radius:6px;">
          <p class="mono" style="font-size:11px;color:var(--gold);margin:0;letter-spacing:.14em;">✅ GAGNANT CONFIRMÉ</p>
          <p class="display" style="font-size:22px;color:var(--stamp);margin:6px 0;animation:stampIn .5s ease;">${esc(out.prenom||"")}</p>
          ${out.prize ? `<p class="mono" style="font-size:12px;color:var(--stone);margin:0;">${esc(out.prize)}</p>` : ""}
        </div>`;
        confettiBurst(resultEl.querySelector(".winner-reveal"));
        if (scanner) { try{ scanner.pause(true); }catch{} }
      } else if (out.error === "already_claimed") {
        resultEl.innerHTML = `<p style="color:var(--stamp);font-family:'IBM Plex Mono',monospace;font-size:13px;margin:0;">⚠️ Déjà réclamé${out.prenom ? " par " + esc(out.prenom) : ""}.</p>`;
      } else {
        resultEl.innerHTML = `<p style="color:var(--stamp);font-family:'IBM Plex Mono',monospace;font-size:13px;margin:0;">❌ ${esc(out.message || out.error || "Code invalide.")}</p>`;
      }
    }catch(e){
      resultEl.innerHTML = `<p class="err" style="margin:0;">Erreur : ${esc(e?.message || String(e))}</p>`;
    }
  }

  document.getElementById("vw-check").onclick = () => runVerify(codeInput.value, null);

  // scanner caméra chargé à la demande — si la caméra est indisponible ou
  // refusée, la saisie manuelle du code reste toujours possible.
  (async () => {
    try{
      if (!window.Html5Qrcode) {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      scanner = new Html5Qrcode("vw-reader");
      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 220 },
        (decodedText) => {
          const parts = decodedText.split("|");
          if (parts[0] === "TIKETO-VERIFY" && parts[1] === restoId && parts[3]) {
            codeInput.value = parts[3];
            runVerify(parts[3], parts[2]);
          } else {
            codeInput.value = decodedText;
          }
        },
        () => {} // erreurs de frame ignorées (normal entre 2 scans, pas d'action à prendre)
      );
    }catch(e){
      const errEl = document.getElementById("vw-cam-err");
      errEl.style.display = "block";
      errEl.textContent = "Caméra indisponible — entre le code manuellement.";
      const readerEl = document.getElementById("vw-reader");
      if (readerEl) readerEl.style.display = "none";
    }
  })();
}

    <div class="perf" style="margin:22px -20px;"></div>

    <details class="section">
    <summary>Historique des tirages ${closedDraws.length ? `(${closedDraws.length})` : ""}</summary>
    <div style="padding-top:10px;">
      ${closedDraws.length === 0
        ? `<p style="font-size:13px;color:var(--stone);font-family:'IBM Plex Mono',monospace;">Aucun tirage clôturé pour l'instant.</p>`
        : closedDraws.map(d => `
          <div class="history-row mono" style="font-size:12px;">
            <strong style="font-family:'Fraunces',serif;font-size:14px;">${esc(d.prize)}</strong>${d.date ? " · " + esc(d.date) : ""}<br>
            <span style="color:var(--stone);">${d.participantCountAtClose ?? "?"} inscrit(s) à ce tirage</span>
            ${d.winner ? ` · Gagnant : <span style="color:var(--stamp);">${esc(d.winner.prenom)}</span>` : ""}
            <br><a href="#" class="hist-view mono" data-draw-id="${d.id}" style="font-size:11px;text-decoration:underline;text-underline-offset:2px;">Voir les inscrits →</a>
            <div class="hist-list-${d.id}" style="margin-top:8px;display:none;"></div>
          </div>`).join("")}
    </div>
    </details>

    <div class="perf" style="margin:22px -20px;"></div>

    <details class="section">
    <summary>Clients <span class="live-client-count">(0)</span></summary>
    <div style="padding-top:10px;">
      <p style="font-size:11px;color:var(--stone);margin:0 0 10px;font-family:'IBM Plex Mono',monospace;">Base permanente de ce commerce, tous tirages confondus — différent du nombre d'inscrits à un tirage précis.</p>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button class="btn btn-secondary copy-list-btn" style="font-size:12px;padding:8px 10px;">📋 Copier</button>
        <button class="btn btn-secondary csv-btn" style="font-size:12px;padding:8px 10px;">⬇️ CSV</button>
      </div>
      <div class="clients-list">Chargement…</div>
    </div>
    </details>
  `;

  container.querySelectorAll(".hist-view").forEach(link => {
    link.onclick = async (e) => {
      e.preventDefault();
      const drawId = link.dataset.drawId;
      const listEl = container.querySelector(`.hist-list-${drawId}`);
      if (listEl.style.display !== "none") { listEl.style.display = "none"; return; }
      listEl.style.display = "block";
      listEl.innerHTML = `<p class="mono" style="font-size:11px;color:var(--stone);">Chargement…</p>`;
      try {
        const pSnap = await getDocs(query(collection(db,"participants"), where("restaurantId","==",id), where("drawId","==",drawId)));
        const list = pSnap.docs.map(d => d.data());
        listEl.innerHTML = list.length === 0
          ? `<p class="mono" style="font-size:11px;color:var(--stone);">Personne n'était inscrit.</p>`
          : list.map(p => `<div class="participant-row" style="font-size:12px;"><span>${esc(p.prenom)}</span><span style="color:var(--stone);">${esc(p.email)}</span></div>`).join("");
      } catch(err) {
        listEl.innerHTML = `<p class="err">Erreur : ${esc(err?.message || String(err))}</p>`;
      }
    };
  });

  container.querySelector(".copy-link-btn").onclick = async () => {
    const btn = container.querySelector(".copy-link-btn");
    try{ await navigator.clipboard.writeText(publicUrl); btn.textContent = "Copié !"; toast("Lien copié"); setTimeout(()=>btn.textContent="Copier",1500); }
    catch{ container.querySelector(".link-input").select(); }
  };

  container.querySelector(".dl-qr-btn").onclick = () => {
    const a = document.createElement("a");
    a.href = qrUrl;
    a.download = `qr-${data.name.replace(/[^a-z0-9]+/gi,"-")}.png`;
    document.body.appendChild(a); a.click(); a.remove();
  };

  container.querySelector(".verify-winner-btn").onclick = () => openVerifyWinnerModal(id);

  const reload = async () => {
    if (container._unsub) { container._unsub.forEach(u => u()); container._unsub = null; }
    container.innerHTML = `<p style="color:var(--stone);font-family:'IBM Plex Mono',monospace;font-size:13px;">Chargement…</p>`;
    await renderDetailInline(id, data, container);
    await loadList();
  };

  const newDrawBtn = container.querySelector(".new-draw-btn");
  if (newDrawBtn) newDrawBtn.onclick = () => openNewDrawModal(id, data.name, openDraw?.id, reload);
  const newDrawBtn2 = container.querySelector(".new-draw-btn2");
  if (newDrawBtn2) newDrawBtn2.onclick = () => openNewDrawModal(id, data.name, null, reload);

  // ---- clients (base permanente, sert aussi aux promos) ----
  let clients = [];
  function renderClientsList(){
    const listEl = container.querySelector(".clients-list");
    container.querySelector(".live-client-count").textContent = `(${clients.length})`;
    const promoCount = clients.filter(c => c.wantsPromo && c.email).length;
    container.querySelector(".promo-count").textContent = `${promoCount} client(s) ont accepté de recevoir des offres.`;
    if (clients.length === 0){
      listEl.innerHTML = `<p style="font-size:13px;color:var(--stone);font-family:'IBM Plex Mono',monospace;">Personne n'a encore scanné le QR code.</p>`;
    } else {
      listEl.innerHTML = clients.map(c => `
        <div class="participant-row">
          <span style="font-weight:600;font-family:'Fraunces',serif;">${esc(c.prenom)}</span>
          <span style="color:var(--stone);">${esc(c.email)}</span>
          <span style="color:${c.wantsPromo ? "var(--gold)" : "var(--stone)"};">${c.wantsPromo ? "promo ok" : ""}</span>
        </div>`).join("");
    }
  }
  const clientsUnsub = onSnapshot(query(collection(db,"clients"), where("restaurantId","==",id)), (snap) => {
    clients = snap.docs.map(d => d.data());
    renderClientsList();
  }, (err) => {
    container.querySelector(".clients-list").innerHTML = `<p class="err">Erreur temps réel : ${esc(err?.message || String(err))}</p>`;
  });

  container.querySelector(".copy-list-btn").onclick = async () => {
    const btn = container.querySelector(".copy-list-btn");
    if (clients.length === 0) { btn.textContent = "Vide"; setTimeout(()=>btn.textContent="📋 Copier",1200); return; }
    const text = clients.map(c => `${c.prenom}\t${c.email}`).join("\n");
    try{ await navigator.clipboard.writeText(text); btn.textContent = "Copié !"; toast("Liste copiée"); setTimeout(()=>btn.textContent="📋 Copier",1500); }
    catch{ btn.textContent = "Erreur copie"; }
  };

  container.querySelector(".csv-btn").onclick = () => {
    if (clients.length === 0) return;
    const header = "prenom,email,veut_promo\n";
    const rows = clients.map(c =>
      [c.prenom, c.email, c.wantsPromo ? "oui" : "non"]
        .map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")
    ).join("\n");
    const blob = new Blob([header + rows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `clients-${data.name.replace(/[^a-z0-9]+/gi,"-")}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast("CSV téléchargé");
  };

  container.querySelector(".send-promo-btn").onclick = async () => {
    const btn = container.querySelector(".send-promo-btn");
    const statusEl = container.querySelector(".promo-status");
    const title = container.querySelector(".promo-title").value.trim();
    const message = container.querySelector(".promo-message").value.trim();
    if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "promo-status err"; return; }

    const targets = [...new Set(clients.filter(c => c.wantsPromo && c.email).map(c => c.email.toLowerCase()))];
    if (targets.length === 0) { statusEl.textContent = "Personne n'a encore accepté de recevoir des offres."; statusEl.className = "promo-status err"; return; }

    btn.disabled = true; btn.textContent = "Envoi…";
    statusEl.textContent = ""; statusEl.className = "promo-status";
    try {
      const idToken = await auth.currentUser.getIdToken();
      const r = await fetch("/api/send-promo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idToken, external_ids: targets, title, message, resto_id: id, origin: window.location.origin })
      });
      const out = await r.json();
      if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
      statusEl.textContent = `Envoyée à ${targets.length} client(s) — vérification en cours…`;
      statusEl.style.color = "var(--stone)";
      toast("Promo envoyée");
      pollDelivery(out.notification_ids, targets.length, statusEl);
    } catch (e) {
      statusEl.textContent = "Erreur : " + (e?.message || String(e));
      statusEl.className = "promo-status err";
    } finally {
      btn.disabled = false; btn.textContent = "Envoyer aux clients qui ont accepté les offres";
    }
  };

  async function pollDelivery(ids, targeted, statusEl){
    if (!ids || !ids.length) return;
    setTimeout(async () => {
      try {
        let successful = 0;
        for (const nid of ids) {
          const chk = await fetch("/api/check-notification", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ notification_id: nid })
          });
          const chkData = await chk.json();
          if (chk.ok && typeof chkData.successful === "number") successful += chkData.successful;
        }
        statusEl.textContent = `Livrée à ${successful} sur ${targeted} ciblé(s) ✅`;
        statusEl.style.color = "var(--stamp)";
      } catch(_) { /* on laisse le message provisoire si la vérif échoue */ }
    }, 4000);
  }

  if (!openDraw) return; // pas de tirage actif : rien de plus à câbler

  // ---- participants du tirage en cours (pour tirage au sort) ----
  let drawParticipants = [];
  const drawUnsub = onSnapshot(query(collection(db,"participants"), where("restaurantId","==",id), where("drawId","==",openDraw.id)), (snap) => {
    drawParticipants = snap.docs.map(d => d.data());
    const el = container.querySelector(".live-draw-count");
    if (el) el.textContent = `(${drawParticipants.length})`;
  }, (err) => {
    console.error("[tiketo] échec lecture participants du tirage:", err);
    const el = container.querySelector(".live-draw-count");
    if (el) el.textContent = " — erreur de lecture";
    const box = container.querySelector(".winner-box");
    if (box) box.innerHTML = `<span class="err">Impossible de lire les participants : ${esc(err?.message || String(err))}</span>`;
  });

  container._unsub = [clientsUnsub, drawUnsub];

  function wireWinnerUI(w){
    const msgsWrap = container.querySelector(".winner-msgs");
    msgsWrap.classList.remove("hidden");
    const winTitleEl = container.querySelector(".win-title");
    const winMsgEl = container.querySelector(".win-message");
    const loseTitleEl = container.querySelector(".lose-title");
    const loseMsgEl = container.querySelector(".lose-message");
    if (!winTitleEl.value.trim()) winTitleEl.value = `Tu as gagné ! — ${data.name}`;
    if (!winMsgEl.value.trim()) winMsgEl.value = `🎉 Félicitations ${w.prenom} ! Tu as gagné : ${openDraw.prize}. Passe le récupérer chez ${data.name}.`;
    if (!loseTitleEl.value.trim()) loseTitleEl.value = `Résultat du tirage — ${data.name}`;
    if (!loseMsgEl.value.trim()) loseMsgEl.value = `Le gagnant est ${w.prenom}. Merci d'avoir participé, à bientôt pour le prochain tirage chez ${data.name} !`;

    container.querySelector(".send-win-btn").onclick = async () => {
      const btn = container.querySelector(".send-win-btn");
      const statusEl = container.querySelector(".win-status");
      const title = winTitleEl.value.trim(), message = winMsgEl.value.trim();
      if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "win-status err"; return; }
      btn.disabled = true; btn.textContent = "Envoi…";
      statusEl.textContent = ""; statusEl.className = "win-status";
      try {
        const idToken = await auth.currentUser.getIdToken();
        const r = await fetch("/api/send-promo", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken, external_ids: [w.email.toLowerCase()], title, message, resto_id: id, origin: window.location.origin, result: "win", drawId: openDraw.id, code: w.code })
        });
        const out = await r.json();
        if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
        statusEl.textContent = "Envoyée au gagnant — vérification en cours…";
        statusEl.style.color = "var(--stone)";
        pollDelivery(out.notification_ids, 1, statusEl);
      } catch(e) {
        statusEl.textContent = "Erreur : " + (e?.message || String(e));
        statusEl.className = "win-status err";
      } finally {
        btn.disabled = false; btn.textContent = "🏆 Envoyer au gagnant";
      }
    };

    container.querySelector(".send-lose-btn").onclick = async () => {
      const btn = container.querySelector(".send-lose-btn");
      const statusEl = container.querySelector(".lose-status");
      const title = loseTitleEl.value.trim(), message = loseMsgEl.value.trim();
      if (!title || !message) { statusEl.textContent = "Remplis le titre et le message."; statusEl.className = "lose-status err"; return; }
      const losers = [...new Set(drawParticipants.filter(p => p.email.toLowerCase() !== w.email.toLowerCase()).map(p => p.email.toLowerCase()))];
      if (losers.length === 0) { statusEl.textContent = "Aucun autre participant à prévenir."; statusEl.className = "lose-status err"; return; }
      btn.disabled = true; btn.textContent = "Envoi…";
      statusEl.textContent = ""; statusEl.className = "lose-status";
      try {
        const idToken = await auth.currentUser.getIdToken();
        const r = await fetch("/api/send-promo", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken, external_ids: losers, title, message, resto_id: id, origin: window.location.origin, result: "lose" })
        });
        const out = await r.json();
        if (!r.ok) throw new Error(out?.error || "Erreur inconnue");
        statusEl.textContent = `Envoyée à ${losers.length} participant(s) — vérification en cours…`;
        statusEl.style.color = "var(--stone)";
        pollDelivery(out.notification_ids, losers.length, statusEl);
      } catch(e) {
        statusEl.textContent = "Erreur : " + (e?.message || String(e));
        statusEl.className = "lose-status err";
      } finally {
        btn.disabled = false; btn.textContent = "📣 Envoyer aux autres";
      }
    };
  }

  // le gagnant avait déjà été tiré avant un précédent rechargement de page :
  // on restaure les boutons d'envoi tout de suite, sans attendre un nouveau clic
  if (openDraw.winner) wireWinnerUI(openDraw.winner);

  const drawBtnEl = container.querySelector(".draw-btn");
  if (drawBtnEl) drawBtnEl.onclick = () => {
    // garde-fou : un tirage déjà gagné ne peut pas être re-tiré (le bouton
    // est normalement absent du DOM dans ce cas, mais on double-vérifie ici
    // au cas où l'état local serait périmé)
    if (openDraw.winner) return;
    const box = container.querySelector(".winner-box");
    if (drawParticipants.length === 0){ box.textContent = "Aucun participant pour l'instant sur ce tirage."; return; }
    let i = 0;
    const spin = setInterval(() => {
      const w = drawParticipants[Math.floor(Math.random()*drawParticipants.length)];
      box.innerHTML = `<div style="text-align:center;padding:16px 0;background:var(--paper-deep);border-radius:6px;">
        <p class="mono" style="font-size:11px;color:var(--stone);margin:0;letter-spacing:.1em;">TIRAGE EN COURS...</p>
        <p class="display" style="font-size:24px;color:var(--carbon);margin:4px 0;">${esc(w.prenom)}</p>
      </div>`;
      i++;
      if (i > 16){
        clearInterval(spin);
        box.innerHTML = `<div class="winner-reveal" style="text-align:center;padding:18px 0;background:var(--paper-deep);border-radius:6px;">
          <p class="mono" style="font-size:11px;color:var(--gold);margin:0;letter-spacing:.14em;">🎉 GAGNANT 🎉</p>
          <p class="display" style="font-size:28px;color:var(--stamp);margin:6px 0;animation:stampIn .5s ease;">${esc(w.prenom)}</p>
          <p class="mono" style="font-size:13px;color:var(--stone);margin:0;">${esc(w.email)}</p>
        </div>`;
        confettiBurst(box.querySelector(".winner-reveal"));

        // on fige tout de suite l'état local pour bloquer un double-clic
        // pendant que l'écriture Firestore est encore en vol
        const winnerData = { prenom: w.prenom, email: w.email, code: genWinnerCode(), claimed: false };
        openDraw.winner = winnerData;
        if (drawBtnEl) drawBtnEl.remove();
        updateDoc(doc(db,"draws",openDraw.id), { winner: winnerData }).catch(()=>{});
        wireWinnerUI(winnerData);
      }
    }, 90);
  };
}

// Tout le script est maintenant chargé (fonctions + constantes) : on peut démarrer.
init();
</script>
</body>
</html>
